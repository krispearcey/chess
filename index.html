<script>
  function renderBoardMarkup(previewArrow = null){
    const box = document.getElementById("boardBox");
    if (!boardMarkup || !box){
      return;
    }

    const boxRect = box.getBoundingClientRect();
    const w = Math.max(1, Math.round(boxRect.width));
    const h = Math.max(1, Math.round(boxRect.height));

    const ns = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(ns, "svg");
    svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
    svg.setAttribute("preserveAspectRatio", "none");

    const defs = document.createElementNS(ns, "defs");
    const marker = document.createElementNS(ns, "marker");
    marker.setAttribute("id", "arrowhead");
    marker.setAttribute("markerWidth", "10");
    marker.setAttribute("markerHeight", "10");
    marker.setAttribute("refX", "8");
    marker.setAttribute("refY", "5");
    marker.setAttribute("orient", "auto");
    marker.setAttribute("markerUnits", "userSpaceOnUse");

    const markerPath = document.createElementNS(ns, "path");
    markerPath.setAttribute("d", "M 0 0 L 8 5 L 0 10 z");
    markerPath.setAttribute("fill", "rgba(245, 150, 40, 0.95)");
    marker.appendChild(markerPath);
    defs.appendChild(marker);
    svg.appendChild(defs);

    for (const square of squareMarks){
      const c = getSquareCenter(square);
      if (!c) continue;

      const rect = document.createElementNS(ns, "rect");
      const pad = c.size * 0.08;
      rect.setAttribute("x", String(c.x - (c.size / 2) + pad));
      rect.setAttribute("y", String(c.y - (c.size / 2) + pad));
      rect.setAttribute("width", String(c.size - pad * 2));
      rect.setAttribute("height", String(c.size - pad * 2));
      rect.setAttribute("rx", String(c.size * 0.08));
      rect.setAttribute("fill", "rgba(245, 150, 40, 0.24)");
      rect.setAttribute("stroke", "rgba(245, 150, 40, 0.95)");
      rect.setAttribute("stroke-width", String(Math.max(2, c.size * 0.04)));
      svg.appendChild(rect);
    }

    function drawArrow(from, to, isPreview){
      const a = getSquareCenter(from);
      const b = getSquareCenter(to);
      if (!a || !b) return;

      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const len = Math.hypot(dx, dy);
      if (len < 2) return;

      const ux = dx / len;
      const uy = dy / len;

      const strokeW = Math.max(4, a.size * 0.09);
      const headLen = Math.max(12, a.size * 0.26);

      const startOffset = a.size * 0.16;
      const endOffset = b.size * 0.18;

      const x1 = a.x + ux * startOffset;
      const y1 = a.y + uy * startOffset;

      /* End shaft at the BACK of the arrow head so the line does not overlap it */
      const x2 = b.x - ux * (endOffset + headLen);
      const y2 = b.y - uy * (endOffset + headLen);

      const line = document.createElementNS(ns, "line");
      line.setAttribute("x1", String(x1));
      line.setAttribute("y1", String(y1));
      line.setAttribute("x2", String(x2));
      line.setAttribute("y2", String(y2));
      line.setAttribute("stroke", isPreview ? "rgba(245, 150, 40, 0.55)" : "rgba(245, 150, 40, 0.95)");
      line.setAttribute("stroke-width", String(strokeW));
      line.setAttribute("stroke-linecap", "round");
      svg.appendChild(line);

      const head = document.createElementNS(ns, "line");
      head.setAttribute("x1", String(x2));
      head.setAttribute("y1", String(y2));
      head.setAttribute("x2", String(b.x - ux * endOffset));
      head.setAttribute("y2", String(b.y - uy * endOffset));
      head.setAttribute("stroke", "transparent");
      head.setAttribute("stroke-width", "1");
      head.setAttribute("marker-end", "url(#arrowhead)");
      svg.appendChild(head);
    }

    for (const arrow of arrowMarks){
      drawArrow(arrow.from, arrow.to, false);
    }

    if (previewArrow && previewArrow.from && previewArrow.to && previewArrow.from !== previewArrow.to){
      drawArrow(previewArrow.from, previewArrow.to, true);
    }

    boardMarkup.innerHTML = "";
    boardMarkup.appendChild(svg);
  }
</script>
